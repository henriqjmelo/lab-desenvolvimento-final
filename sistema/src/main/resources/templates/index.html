<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Moeda Estudantil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-body">
    <div th:insert="fragments/header :: siteHeader"></div>
    <div class="container pb-5">
        <div class="hero-card text-center mx-auto" style="max-width: 820px;">
            <div class="mb-4">
                <img src="/images/logo.svg" th:src="@{/images/logo.svg}" alt="Logo RU" class="hero-logo">
            </div>
            <h1 class="display-5 fw-bold">Bem-vindo ao Sistema de Moeda Estudantil</h1>
            <p class="lead text-secondary">Reconhecendo o mérito acadêmico com moedas digitais, parcerias e resgates.</p>
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4">
                <a href="/login" class="btn btn-primary btn-lg px-5">Entrar</a>
                <a href="/cadastro/aluno" class="btn btn-outline-primary btn-lg px-5">Cadastrar</a>
            </div>
        </div>
    </div>
</body>
</html>
