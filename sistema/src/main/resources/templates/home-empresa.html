<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel da Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Painel Parceiro: <span th:text="${user.nome}">Empresa</span></h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-danger">Sair</button>
        </form>
    </div>

    <div class="alert alert-info">
        Como empresa parceira, você pode visualizar as vantagens cadastradas e os cupons resgatados (funcionalidade em expansão na Release 2).
    </div>
    
    <div class="mt-4">
        <a href="/" class="btn btn-secondary">Voltar ao Início</a>
    </div>
</body>
</html>
