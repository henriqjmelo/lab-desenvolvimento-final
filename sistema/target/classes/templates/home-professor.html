<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel do Professor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-body">
    <div th:insert="fragments/header :: siteHeader"></div>
    <div class="container pb-5">
        <div class="panel-card p-4 mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
                <div>
                    <h1 class="fw-bold">Olá, Prof. <span th:text="${user.nome}">Professor</span>!</h1>
                    <p class="text-secondary mb-1">Acompanhe seus envios e distribua moedas para alunos com facilidade.</p>
                </div>
                <div class="text-md-end">
                    <h4 class="text-primary mb-2">Saldo: <span th:text="${user.saldo} + ' moedas'">0 moedas</span></h4>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger">Sair</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="panel-card p-4">
                    <h3 class="mb-4">Enviar Moedas</h3>
                    <form th:action="@{/enviar-moedas}" method="post" class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Aluno</label>
                            <select name="alunoId" class="form-select" required>
                                <option value="">Selecione um aluno...</option>
                                <option th:each="a : ${alunos}" th:value="${a.id}" th:text="${a.nome + ' (' + a.curso + ')'}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Quantidade</label>
                            <input type="number" name="valor" class="form-control" min="1" th:max="${user.saldo}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Motivo</label>
                            <textarea name="motivo" class="form-control" rows="3" required placeholder="Ex: Participação excelente na aula de hoje."></textarea>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-success">Enviar Moedas</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="panel-card p-4">
                    <h3 class="mb-4">Histórico de Envios</h3>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="t : ${transacoes}">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span>Para: <strong th:text="${t.destinatario.nome}">Aluno</strong></span>
                                <span class="badge bg-primary" th:text="'-' + ${t.valor}">-10</span>
                            </div>
                            <small class="text-muted d-block mb-1" th:text="${#temporals.format(t.data, 'dd/MM/yyyy HH:mm')}">Data</small>
                            <small th:text="${t.motivo}">Motivo</small>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
