<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Moeda Estudantil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-body">
    <div th:insert="fragments/header :: siteHeader"></div>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card mx-auto">
                    <div class="text-center mb-4">
                        <img src="/images/logo.svg" th:src="@{/images/logo.svg}" alt="Logo RU" class="hero-logo mb-3">
                        <h2 class="fw-bold">Acesse sua conta</h2>
                        <p class="text-secondary">Digite seu email e senha para continuar.</p>
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger">Email ou senha inválidos.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                    <div class="mt-3 text-center footer-note">
                        <a href="/">Voltar para a página inicial</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
